name: Post to social media

on:
  schedule:
    - cron: "0 8 * * *"     # morning slot  — 08:00 UTC
    - cron: "0 12 * * *"    # midday slot   — 12:00 UTC
    - cron: "30 16 * * *"   # evening slot  — 16:30 UTC
  workflow_dispatch:
    inputs:
      slot:
        description: "Time slot (morning / midday / evening)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (generate but do not post)"
        required: false
        default: "false"

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Post to social media
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.slot }}" ]; then
            ARGS="--slot ${{ github.event.inputs.slot }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          npx tsx scripts/postSocial.ts $ARGS
