<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="barOrange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="barDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#293548"/>
      <stop offset="100%" stop-color="#1a2436"/>
    </linearGradient>
    <radialGradient id="glowOrange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#f97316" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background: deep dark rounded square -->
  <rect width="400" height="400" rx="72" fill="#0f172a"/>

  <!-- Subtle orange ambient glow beneath center bar -->
  <ellipse cx="200" cy="340" rx="72" ry="28" fill="url(#glowOrange)"/>

  <!-- Floor / baseline -->
  <line x1="76" y1="345" x2="324" y2="345" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>

  <!-- Bar 1 — Low (P25) -->
  <rect x="88" y="255" width="64" height="90" rx="12" fill="url(#barDark)"/>

  <!-- Bar 2 — Median (P50) — orange, tallest -->
  <rect x="168" y="173" width="64" height="172" rx="12" fill="url(#barOrange)" filter="url(#softShadow)"/>

  <!-- Bar 3 — High (P75) -->
  <rect x="248" y="222" width="64" height="123" rx="12" fill="url(#barDark)"/>

  <!-- Subtle distribution arc connecting the three bar tops -->
  <path d="M 120 249 C 152 195 248 178 280 215"
        stroke="#f97316" stroke-width="2" fill="none"
        stroke-opacity="0.30" stroke-linecap="round"/>

  <!-- Indicator dot — sits just above the median bar top -->
  <!-- Outer soft halo -->
  <circle cx="200" cy="160" r="26" fill="#f97316" fill-opacity="0.15"/>
  <!-- White ring -->
  <circle cx="200" cy="160" r="16" fill="white"/>
  <!-- Orange core -->
  <circle cx="200" cy="160" r="9" fill="#f97316"/>
</svg>
